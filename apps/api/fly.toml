# fly.toml app configuration file generated for api-scout-scoring on 2026-04-28T21:13:32+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'api-scout-scoring'
primary_region = 'fra'
kill_signal = 'SIGTERM'

[build]

[deploy]

[env]
  PHX_HOST = 'api-scout-scoring.fly.dev'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
